id: vanguard-professional
name: Copoint Professional
version: 1.0.0
description: Clean, corporate-friendly design with slate and blue tones. Perfect for business applications and client dashboards.
isDark: false

colors:
  primary:
    50: '#f0f9ff'
    100: '#e0f2fe'
    200: '#bae6fd'
    300: '#7dd3fc'
    400: '#38bdf8'
    500: '#0ea5e9'
    600: '#0284c7'
    700: '#0369a1'
    800: '#075985'
    900: '#0c4a6e'
    950: '#082f49'

  secondary:
    50: '#f8fafc'
    100: '#f1f5f9'
    200: '#e2e8f0'
    300: '#cbd5e1'
    400: '#94a3b8'
    500: '#64748b'
    600: '#475569'
    700: '#334155'
    800: '#1e293b'
    900: '#0f172a'
    950: '#020617'

  accent:
    50: '#faf5ff'
    100: '#f3e8ff'
    200: '#e9d5ff'
    300: '#d8b4fe'
    400: '#c084fc'
    500: '#a855f7'
    600: '#9333ea'
    700: '#7e22ce'
    800: '#6b21a8'
    900: '#581c87'
    950: '#3b0764'

  neutral:
    50: '#fafafa'
    100: '#f5f5f5'
    200: '#e5e5e5'
    300: '#d4d4d4'
    400: '#a3a3a3'
    500: '#737373'
    600: '#525252'
    700: '#404040'
    800: '#262626'
    900: '#171717'
    950: '#0a0a0a'

  semantic:
    success:
      light: '#dcfce7'
      base: '#22c55e'
      dark: '#15803d'
    warning:
      light: '#fef3c7'
      base: '#f59e0b'
      dark: '#b45309'
    error:
      light: '#fee2e2'
      base: '#ef4444'
      dark: '#b91c1c'
    info:
      light: '#dbeafe'
      base: '#3b82f6'
      dark: '#1d4ed8'

typography:
  fontFamilies:
    sans:
      - 'Inter'
      - 'system-ui'
      - '-apple-system'
      - 'BlinkMacSystemFont'
      - 'Segoe UI'
      - 'Roboto'
      - 'sans-serif'
    serif:
      - 'Georgia'
      - 'Cambria'
      - 'Times New Roman'
      - 'serif'
    mono:
      - 'JetBrains Mono'
      - 'Fira Code'
      - 'Consolas'
      - 'Monaco'
      - 'Courier New'
      - 'monospace'

  scale:
    xs: '0.75rem'
    sm: '0.875rem'
    base: '1rem'
    lg: '1.125rem'
    xl: '1.25rem'
    2xl: '1.5rem'
    3xl: '1.875rem'
    4xl: '2.25rem'
    5xl: '3rem'
    6xl: '3.75rem'
    7xl: '4.5rem'
    8xl: '6rem'
    9xl: '8rem'

  weights:
    light: 300
    normal: 400
    medium: 500
    semibold: 600
    bold: 700
    extrabold: 800

  lineHeights:
    tight: '1.25'
    snug: '1.375'
    normal: '1.5'
    relaxed: '1.625'
    loose: '2'

spacing:
  0: '0'
  0.5: '0.125rem'
  1: '0.25rem'
  1.5: '0.375rem'
  2: '0.5rem'
  2.5: '0.625rem'
  3: '0.75rem'
  3.5: '0.875rem'
  4: '1rem'
  5: '1.25rem'
  6: '1.5rem'
  7: '1.75rem'
  8: '2rem'
  9: '2.25rem'
  10: '2.5rem'
  11: '2.75rem'
  12: '3rem'
  14: '3.5rem'
  16: '4rem'
  20: '5rem'
  24: '6rem'
  28: '7rem'
  32: '8rem'
  36: '9rem'
  40: '10rem'
  44: '11rem'
  48: '12rem'
  52: '13rem'
  56: '14rem'
  60: '15rem'
  64: '16rem'
  72: '18rem'
  80: '20rem'
  96: '24rem'

radii:
  none: '0'
  sm: '0.125rem'
  base: '0.25rem'
  md: '0.375rem'
  lg: '0.5rem'
  xl: '0.75rem'
  2xl: '1rem'
  3xl: '1.5rem'
  full: '9999px'

shadows:
  sm: '0 1px 2px 0 rgb(0 0 0 / 0.05)'
  base: '0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)'
  md: '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)'
  lg: '0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)'
  xl: '0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1)'
  2xl: '0 25px 50px -12px rgb(0 0 0 / 0.25)'
  inner: 'inset 0 2px 4px 0 rgb(0 0 0 / 0.05)'
  none: 'none'

components:
  button:
    primary: 'bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg px-4 py-2 shadow-sm'
    secondary: 'bg-secondary-100 hover:bg-secondary-200 text-secondary-900 font-medium rounded-lg px-4 py-2'
    ghost: 'bg-transparent hover:bg-neutral-100 text-neutral-700 font-medium rounded-lg px-4 py-2'
    destructive: 'bg-error-base hover:bg-error-dark text-white font-medium rounded-lg px-4 py-2 shadow-sm'

  card:
    default: 'bg-white border border-neutral-200 rounded-xl p-6 shadow-sm'
    elevated: 'bg-white rounded-xl p-6 shadow-lg'
    bordered: 'bg-white border-2 border-neutral-300 rounded-xl p-6'

  input:
    default: 'bg-white border border-neutral-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary-500 focus:border-primary-500'
    error: 'bg-white border border-error-base rounded-lg px-3 py-2 focus:ring-2 focus:ring-error-base focus:border-error-base'
