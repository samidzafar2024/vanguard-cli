id: vanguard-dark
name: Copoint Dark
version: 1.0.0
description: Dark mode variant with high contrast and reduced eye strain. Ideal for long development sessions and low-light environments.
isDark: true

colors:
  primary:
    50: '#1e3a8a'
    100: '#1e40af'
    200: '#1d4ed8'
    300: '#2563eb'
    400: '#3b82f6'
    500: '#60a5fa'
    600: '#93c5fd'
    700: '#bfdbfe'
    800: '#dbeafe'
    900: '#eff6ff'
    950: '#f0f9ff'

  secondary:
    50: '#0f172a'
    100: '#1e293b'
    200: '#334155'
    300: '#475569'
    400: '#64748b'
    500: '#94a3b8'
    600: '#cbd5e1'
    700: '#e2e8f0'
    800: '#f1f5f9'
    900: '#f8fafc'
    950: '#ffffff'

  accent:
    50: '#581c87'
    100: '#6b21a8'
    200: '#7e22ce'
    300: '#9333ea'
    400: '#a855f7'
    500: '#c084fc'
    600: '#d8b4fe'
    700: '#e9d5ff'
    800: '#f3e8ff'
    900: '#faf5ff'
    950: '#fefcff'

  neutral:
    50: '#0a0a0a'
    100: '#171717'
    200: '#262626'
    300: '#404040'
    400: '#525252'
    500: '#737373'
    600: '#a3a3a3'
    700: '#d4d4d4'
    800: '#e5e5e5'
    900: '#f5f5f5'
    950: '#fafafa'

  semantic:
    success:
      light: '#15803d'
      base: '#22c55e'
      dark: '#86efac'
    warning:
      light: '#b45309'
      base: '#f59e0b'
      dark: '#fcd34d'
    error:
      light: '#b91c1c'
      base: '#ef4444'
      dark: '#fca5a5'
    info:
      light: '#1d4ed8'
      base: '#3b82f6'
      dark: '#93c5fd'

typography:
  fontFamilies:
    sans:
      - 'Inter'
      - 'system-ui'
      - '-apple-system'
      - 'BlinkMacSystemFont'
      - 'Segoe UI'
      - 'Roboto'
      - 'sans-serif'
    serif:
      - 'Georgia'
      - 'Cambria'
      - 'Times New Roman'
      - 'serif'
    mono:
      - 'JetBrains Mono'
      - 'Fira Code'
      - 'Consolas'
      - 'Monaco'
      - 'Courier New'
      - 'monospace'

  scale:
    xs: '0.75rem'
    sm: '0.875rem'
    base: '1rem'
    lg: '1.125rem'
    xl: '1.25rem'
    2xl: '1.5rem'
    3xl: '1.875rem'
    4xl: '2.25rem'
    5xl: '3rem'
    6xl: '3.75rem'
    7xl: '4.5rem'
    8xl: '6rem'
    9xl: '8rem'

  weights:
    light: 300
    normal: 400
    medium: 500
    semibold: 600
    bold: 700
    extrabold: 800

  lineHeights:
    tight: '1.25'
    snug: '1.375'
    normal: '1.5'
    relaxed: '1.625'
    loose: '2'

spacing:
  0: '0'
  0.5: '0.125rem'
  1: '0.25rem'
  1.5: '0.375rem'
  2: '0.5rem'
  2.5: '0.625rem'
  3: '0.75rem'
  3.5: '0.875rem'
  4: '1rem'
  5: '1.25rem'
  6: '1.5rem'
  7: '1.75rem'
  8: '2rem'
  9: '2.25rem'
  10: '2.5rem'
  11: '2.75rem'
  12: '3rem'
  14: '3.5rem'
  16: '4rem'
  20: '5rem'
  24: '6rem'
  28: '7rem'
  32: '8rem'
  36: '9rem'
  40: '10rem'
  44: '11rem'
  48: '12rem'
  52: '13rem'
  56: '14rem'
  60: '15rem'
  64: '16rem'
  72: '18rem'
  80: '20rem'
  96: '24rem'

radii:
  none: '0'
  sm: '0.125rem'
  base: '0.25rem'
  md: '0.375rem'
  lg: '0.5rem'
  xl: '0.75rem'
  2xl: '1rem'
  3xl: '1.5rem'
  full: '9999px'

shadows:
  sm: '0 1px 2px 0 rgb(0 0 0 / 0.5)'
  base: '0 1px 3px 0 rgb(0 0 0 / 0.6), 0 1px 2px -1px rgb(0 0 0 / 0.6)'
  md: '0 4px 6px -1px rgb(0 0 0 / 0.6), 0 2px 4px -2px rgb(0 0 0 / 0.6)'
  lg: '0 10px 15px -3px rgb(0 0 0 / 0.7), 0 4px 6px -4px rgb(0 0 0 / 0.7)'
  xl: '0 20px 25px -5px rgb(0 0 0 / 0.7), 0 8px 10px -6px rgb(0 0 0 / 0.7)'
  2xl: '0 25px 50px -12px rgb(0 0 0 / 0.8)'
  inner: 'inset 0 2px 4px 0 rgb(0 0 0 / 0.3)'
  none: 'none'

components:
  button:
    primary: 'bg-primary-500 hover:bg-primary-600 text-neutral-950 font-medium rounded-lg px-4 py-2 shadow-md'
    secondary: 'bg-secondary-200 hover:bg-secondary-300 text-secondary-950 font-medium rounded-lg px-4 py-2'
    ghost: 'bg-transparent hover:bg-neutral-200/10 text-neutral-700 font-medium rounded-lg px-4 py-2'
    destructive: 'bg-error-base hover:bg-error-dark text-neutral-950 font-medium rounded-lg px-4 py-2 shadow-md'

  card:
    default: 'bg-neutral-100 border border-neutral-300 rounded-xl p-6 shadow-md'
    elevated: 'bg-neutral-100 rounded-xl p-6 shadow-xl'
    bordered: 'bg-neutral-100 border-2 border-neutral-400 rounded-xl p-6'

  input:
    default: 'bg-neutral-100 border border-neutral-300 rounded-lg px-3 py-2 text-neutral-950 placeholder:text-neutral-500 focus:ring-2 focus:ring-primary-500 focus:border-primary-500'
    error: 'bg-neutral-100 border border-error-base rounded-lg px-3 py-2 text-neutral-950 focus:ring-2 focus:ring-error-base focus:border-error-base'
